<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline';"
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Hub | Paulbase</title>
  </head>
  <body>
    <div
      class="container min-vh-100 d-flex flex-column justify-content-center align-items-center"
    >
      <div class="px-4 text-center w-100">
        <p class="font-monospace fw-lighter text-secondary">Estás usando</p>
        <h1 class="display-4 fw-bold text-white mb-3 efecto-platinado">
          Paulbase <strong>Hub</strong> <span class="lead">v1.0.0</span>
        </h1>

        <div class="col-lg-6 mx-auto">
          <p class="lead mb-4 text-secondary font-monospace">
            Un side project que busca agrupar herramientas básicas súper
            útiles en un solo lugar.
          </p>

          <!-- Contenedores dinámicos -->
          <div id="search-container" class="mb-4"></div>
          <div id="categories-container" class="mb-4"></div>
          <div id="tools-container" class="tools-grid"></div>

          <!-- Contador de resultados -->
          <div id="results-counter" class="results-counter"></div>
        </div>

        <div
          class="overflow-hidden mx-auto"
          style="max-height: 30vh; max-width: 700px"
        >
          <div class="container px-5">
            <!-- Hace falta poner algo bien bellaco aquí -->
            <quote class="lead fst-italic">zdes' vmesto nas ostalis' rvi</quote>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
